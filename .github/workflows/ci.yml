# Integration continue : a chaque push, on installe et on lance les tests.
# C'est ce qui garantit qu'on ne casse rien sans s'en rendre compte.

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer les tests avec couverture
        run: pytest --cov=src --cov-report=term-missing
